name: flowboard
version: '1.0.0'
config-version: 2

profile: flowboard

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  flowboard:
    staging:
      +materialized: view
    intermediate:
      +materialized: view
    marts:
      +materialized: table
